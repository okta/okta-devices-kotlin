version: 2.1

orbs:
  general-platform-helpers: okta/general-platform-helpers@1.9.4
  platform-helpers: okta/platform-helpers@2.0.0
  python: circleci/python@2.1.1
  aws-cli: circleci/aws-cli@5.1

aliases:

jobs:
  detekt-code-analysis:
    docker:
      - image: cimg/android:2026.01
    environment:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - checkout
      - run:
          name: detekt
          command: ./gradlew detekt

  devices-push-test:
    docker:
      - image: cimg/android:2026.01
    steps:
      - checkout
      - run:
          name: test
          command: ./gradlew devices-push:testDebugUnitTest -i

  devices-push-build:
    docker:
      - image: cimg/android:2026.01
    steps:
      - checkout
      - run:
          name: build
          command: ./gradlew devices-push:assemble

  spotlessCheck:
    docker:
      - image: cimg/android:2026.01
    steps:
      - checkout
      - run:
          name: spotless
          command: ./gradlew spotlessCheck

  reversing-labs:
    docker:
      - image: cimg/openjdk:17.0.11
    steps:
      - checkout

      - run:
          name: Install Python
          command: |
            sudo apt-get update
            sudo apt-get install -y python3 python3-pip
            sudo pip install --upgrade pip
      - run:
          name: Download Reverse Labs Scanner
          command: |
            curl https://dso-resources.oktasecurity.com/scanner \
              -H "x-api-key: $DSO_RLSECURE_TOKEN" \
              --output rl_wrapper-0.0.2+35ababa-py3-none-any.whl
      # Install the wrapper that was downloaded
      - run:
          name: Install RL Wrapper
          command: |
            pip install ./rl_wrapper-0.0.2+35ababa-py3-none-any.whl
      # Setup the AWS profile
      - aws-cli/setup:
          profile_name: default
          role_arn: $AWS_ARN
          region: us-east-1
      # Get the credentials and save to env
      - run: >-
          eval "$(aws configure export-credentials --profile default --format env)" 2> /dev/null
      # Run the wrapper, do not change anything here
      - run:
          name: Run Reversing Labs Wrapper Scanner
          command: |
            rl-wrapper \
              --artifact ${CIRCLE_WORKING_DIRECTORY/#\~/$HOME} \
              --name $CIRCLE_PROJECT_REPONAME\
              --version $CIRCLE_SHA1\
              --repository $CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME \
              --commit $CIRCLE_SHA1 \
              --build-env "circleci" \
              --suppress_output         

workflows:
  build-and-test:
    jobs:
      - detekt-code-analysis
      - devices-push-test
      - devices-push-build
      - spotlessCheck
  "Malware Scanner":
    jobs:
      - reversing-labs:
          context:
            - static-analysis
